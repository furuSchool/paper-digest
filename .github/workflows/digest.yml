name: Run Digest

on:
  schedule:
    # 毎日 22:00 UTC (= 翌 07:00 JST) に実行
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up backend
        run: |
          echo "Waiting for backend to wake up..."
          for i in $(seq 1 20); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${{ secrets.BACKEND_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready (attempt $i)"
              break
            fi
            echo "Attempt $i/20: got HTTP $STATUS, sleeping 15s..."
            sleep 15
          done

      - name: Trigger digest endpoint
        run: |
          curl -X POST \
            -H "X-API-Key: ${{ secrets.TRIGGER_API_KEY }}" \
            "${{ secrets.BACKEND_URL }}/digest/trigger" \
            --fail \
            --silent \
            --show-error
